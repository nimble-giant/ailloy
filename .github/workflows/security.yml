name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 0 * * 0' # Weekly on Sunday at midnight

jobs:
  gosec:
    name: Gosec Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Run Gosec
        uses: securego/gosec@master
        with:
          args: ./...

  govulncheck:
    name: Vulnerability Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version: '1.26'
          check-latest: true
          cache: true

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        env:
          # Allow the Go binary to download a newer toolchain than the runner
          # image carries. setup-go pins GOTOOLCHAIN=local, which prevents
          # picking up stdlib security fixes (e.g. 1.26.4) until
          # actions/go-versions publishes them.
          GOTOOLCHAIN: go1.26.4+auto
        run: govulncheck ./...
