name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build-binaries:
    name: Build and Upload Binaries
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true

      - name: Run tests
        run: go test -v ./...

      - name: Build binaries
        env:
          RELEASE_VERSION: ${{ needs.release-please.outputs.version }}
        run: |
          VERSION="v${RELEASE_VERSION}"
          COMMIT=$(git rev-parse --short HEAD)
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          # -s -w strips symbol table and DWARF debug info (~25% smaller).
          LDFLAGS="-s -w -X main.version=${VERSION} -X main.commit=${COMMIT} -X main.date=${DATE}"

          # Linux AMD64
          GOOS=linux GOARCH=amd64 go build -trimpath -ldflags "${LDFLAGS}" -o dist/ailloy-linux-amd64 ./cmd/ailloy

          # Linux ARM64
          GOOS=linux GOARCH=arm64 go build -trimpath -ldflags "${LDFLAGS}" -o dist/ailloy-linux-arm64 ./cmd/ailloy

          # macOS AMD64
          GOOS=darwin GOARCH=amd64 go build -trimpath -ldflags "${LDFLAGS}" -o dist/ailloy-darwin-amd64 ./cmd/ailloy

          # macOS ARM64
          GOOS=darwin GOARCH=arm64 go build -trimpath -ldflags "${LDFLAGS}" -o dist/ailloy-darwin-arm64 ./cmd/ailloy

          # Windows AMD64
          GOOS=windows GOARCH=amd64 go build -trimpath -ldflags "${LDFLAGS}" -o dist/ailloy-windows-amd64.exe ./cmd/ailloy

      - name: Compress binaries (xz)
        run: |
          # xz with max preset + extreme mode on macOS/Linux only. Windows
          # users download .exe directly and shouldn't have to decompress
          # by hand. Homebrew and `ailloy evolve` both consume the .xz
          # artifacts (see internal/commands/evolve.go).
          cd dist
          for f in ailloy-linux-amd64 ailloy-linux-arm64 ailloy-darwin-amd64 ailloy-darwin-arm64; do
            xz -9 --extreme --threads=0 "$f"
          done
          ls -la

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Upload Release Artifacts
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          gh release upload "$RELEASE_TAG" dist/*
